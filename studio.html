<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap Happens Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="studio-header">
        <img src="assets/images/scrap-happens-glitter-logo.jpg" alt="Scrap Happens Logo" class="logo">
        <nav class="toolbar" id="toolbar">
            <button>
                <img src="assets/images/upload-photos-glitter-icon.jpg" alt="Upload Photos Icon" class="toolbar-icon">
                <span>Upload Photos</span>
            </button>
            <button>
                <img src="assets/images/add-stickers-glitter-icon.jpg" alt="Add Stickers Icon" class="toolbar-icon">
                <span>Add Stickers</span>
            </button>
            <button>
                <img src="assets/images/save-page-glitter-icon.jpg" alt="Save Page Icon" class="toolbar-icon">
                <span>Save Page</span>
            </button>
            <button>
                <img src="assets/images/new-page-glitter-icon.jpg" alt="New Page Icon" class="toolbar-icon">
                <span>New Page</span>
            </button>
        </nav>
        <button id="menu-toggle" aria-label="Toggle menu">☰</button>
    </header>
    <main class="scrap-canvas">
        <div class="photo-area">
            <img id="photo-preview" src="" alt="Your photo will appear here...">
            <textarea id="caption-input" placeholder="Add a caption or write a story..."></textarea>
        </div>
        <div id="sticker-area">
            <!-- Drag and drop stickers here -->
        </div>
    </main>
    <footer>
        <p class="footer-tagline">Snap. Stick. Share.</p>
        <a href="https://github.com/kaylajill12" target="_blank">
            <img src="assets/images/github-glitter-icon.jpg" alt="Glittery GitHub icon" class="footer-icon"/>
        </a>
    </footer>
</body>
</html>
